<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adlab Solutions - Attendance Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .landing-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: #f1f5f9;
        }
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }
        .portal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }
        .portal-icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
        }
        .portal-item:hover .portal-icon-wrapper {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .emp-bg { background-color: #eef2ff; color: #4f46e5; }
        .mgr-bg { background-color: #f0fdf4; color: #10b981; }
        .adm-bg { background-color: #fff7ed; color: #f97316; }
        
        .portal-title { font-weight: 700; font-size: 1.1rem; }
        .portal-subtitle { font-size: 0.85rem; color: #64748b; text-align: center; margin-top: 0.5rem; }
    </style>
</head>

<body>
    <div class="landing-container">
        <div class="landing-card">
            <h1>Adlab Solutions</h1>
            <p style="color: #64748b; font-size: 1.1rem;">Attendance & Leave Management Portal</p>

            <div class="portal-grid">
                <a href="{{ url_for('employee_login') }}" class="portal-item">
                    <div class="portal-icon-wrapper emp-bg">
                        <i data-lucide="users" size="32"></i>
                    </div>
                    <span class="portal-title">Employee</span>
                    <span class="portal-subtitle">Apply for WFH & Leaves</span>
                </a>

                <a href="{{ url_for('manager_login') }}" class="portal-item">
                    <div class="portal-icon-wrapper mgr-bg">
                        <i data-lucide="briefcase" size="32"></i>
                    </div>
                    <span class="portal-title">Manager</span>
                    <span class="portal-subtitle">Approve team requests</span>
                </a>

                <a href="{{ url_for('admin_login') }}" class="portal-item">
                    <div class="portal-icon-wrapper adm-bg">
                        <i data-lucide="shield-check" size="32"></i>
                    </div>
                    <span class="portal-title">Administrator</span>
                    <span class="portal-subtitle">System settings & Users</span>
                </a>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
