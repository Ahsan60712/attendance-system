<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Login - Adlab Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #10b981; --bg: #f0fdf4; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 3rem 2.5rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.1); width: 100%; max-width: 400px; text-align: center; }
        .icon { width: 64px; height: 64px; background: #ecfdf5; color: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        h1 { font-size: 1.5rem; font-weight: 800; color: #064e3b; margin-bottom: 0.5rem; }
        p { color: #065f46; font-size: 0.9rem; margin-bottom: 2rem; opacity: 0.8; }
        .form-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: #064e3b; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid #d1fae5; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
        .btn:hover { background: #059669; }
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .login-card { padding: 2rem 1.5rem; border-radius: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon"><i data-lucide="briefcase" size="32"></i></div>
        <h1>Manager Portal</h1>
        <p>Access your team workflow.</p>
        
        <form method="POST" action="{{ url_for('manager_login') }}">
            <div class="form-group">
                <label>Manager Name</label>
                <input type="text" name="emp_name" placeholder="Enter manager name" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" name="password" placeholder="••••••••" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                    <button type="button" id="togglePassword" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: #64748b; padding: 0; display: flex; align-items: center; justify-content: center; outline: none;">
                        <i data-lucide="eye" size="18"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn">Login as Manager</button>
        </form>
        <a href="/" style="display: block; margin-top: 1.5rem; font-size: 0.85rem; color: #065f46; text-decoration: none;">Back to Selection</a>
    </div>
    <script>
        lucide.createIcons();

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle the icon
                const icon = this.querySelector('i');
                if (icon) {
                    if (type === 'password') {
                        icon.setAttribute('data-lucide', 'eye');
                    } else {
                        icon.setAttribute('data-lucide', 'eye-off');
                    }
                    lucide.createIcons(); // Re-render Lucide icons
                }
            });
        }
    </script>
</body>
</html>
