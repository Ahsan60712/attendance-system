<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Login - Adlab Solutions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f1f5f9; padding: 1.5rem; }
        .login-card { background: white; padding: 3rem 2.5rem; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { font-size: 1.5rem; color: #1e293b; margin-top: 1rem; }
        .login-header p { color: #64748b; font-size: 0.875rem; margin-top: 0.5rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; color: #475569; margin-bottom: 0.5rem; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1.25rem; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #10b981; }
        .footer-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #64748b; text-decoration: none; }
        .footer-link:hover { color: #10b981; }
        .btn-success { background: #10b981; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn-success:hover { opacity: 0.9; }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div style="background: #f0fdf4; color: #10b981; width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                <i data-lucide="briefcase" size="28"></i>
            </div>
            <h1>Manager Portal</h1>
            <p>Access your team dashboard & requests.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div style="padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.8rem; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('manager_login') }}">
            <label class="form-label">Manager Name</label>
            <input type="text" name="emp_name" class="form-input" placeholder="Enter manager name" required>

            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required>

            <button type="submit" class="btn-success" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i data-lucide="log-in" size="18"></i> Sign In
            </button>
        </form>

        <a href="{{ url_for('index') }}" class="footer-link">
            <i data-lucide="home" size="14" style="vertical-align: middle; margin-right: 4px;"></i> Back to Home
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
