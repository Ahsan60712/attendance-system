<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Login - Adlab Solutions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 28px;
            padding: 3rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-icon {
            width: 64px; height: 64px; border-radius: 18px;
            background: linear-gradient(135deg, #dbeafe, #cffafe);
            color: #3b82f6;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem;
        }
        .login-card h1 {
            font-size: 1.75rem; font-weight: 800; color: var(--dark); margin-bottom: 0.25rem;
        }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        .btn-primary { width: 100%; justify-content: center; margin-top: 0.5rem; }
        .form-footer {
            margin-top: 1.5rem; text-align: center;
        }
        .form-footer a {
            color: var(--primary); text-decoration: none; font-weight: 500;
            display: inline-flex; align-items: center; gap: 0.35rem;
            transition: var(--transition);
        }
        .form-footer a:hover { opacity: 0.7; }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">
                <i data-lucide="briefcase" style="width:28px;height:28px;"></i>
            </div>
            <h1>Manager Login</h1>
            <p class="subtitle">Enter your manager credentials to continue</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('manager_login') }}" autocomplete="off">
                <div class="form-group">
                    <label for="emp_name">Manager Name</label>
                    <input type="text" id="emp_name" name="emp_name" placeholder="Enter your name" required autofocus autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary">
                    <i data-lucide="log-in" style="width:18px;height:18px;"></i>
                    Sign In
                </button>
            </form>

            <div class="form-footer">
                <a href="{{ url_for('index') }}">
                    <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
