<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Adlab Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #f97316; --bg: #fff7ed; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 3rem 2.5rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(249, 115, 22, 0.1); width: 100%; max-width: 400px; text-align: center; }
        .icon { width: 64px; height: 64px; background: #fff7ed; color: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        h1 { font-size: 1.5rem; font-weight: 800; color: #7c2d12; margin-bottom: 0.5rem; }
        p { color: #9a3412; font-size: 0.9rem; margin-bottom: 2rem; opacity: 0.8; }
        .form-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: #7c2d12; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid #ffedd5; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        .btn { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
        .btn:hover { background: #ea580c; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon"><i data-lucide="lock" size="32"></i></div>
        <h1>Admin Portal</h1>
        <p>System control and overview.</p>
        
        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label>Admin Username</label>
                <input type="text" name="emp_name" placeholder="Admin username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In to Admin</button>
        </form>
        <a href="/" style="display: block; margin-top: 1.5rem; font-size: 0.85rem; color: #9a3412; text-decoration: none;">Back to Selection</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
