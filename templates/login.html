{% extends "base.html" %}

{% block title %}Login - Adlab Solutions{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h2>🔐 HR Login</h2>
            <p>Please enter your credentials to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter username"
                    required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>
        </form>

        <div class="login-footer">
            <p class="hint">💡 Default credentials: admin / password123</p>
        </div>
    </div>
</div>
{% endblock %}
