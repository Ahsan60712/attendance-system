{% extends "base.html" %}

{% block title %}Login - Adlab Solutions{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-box {
        background: #ffffff;
        padding: 35px 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-header {
        text-align: center;
        margin-bottom: 25px;
    }

    .login-header h2 {
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
    }

    .login-header p {
        font-size: 14px;
        color: #777;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: #444;
        font-weight: 500;
    }

    .form-input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        transition: all 0.2s ease;
        font-size: 14px;
    }

    .form-input:focus {
        border-color: #4f46e5;
        outline: none;
        box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
    }

    .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-primary {
        background: #4f46e5;
        color: white;
    }

    .btn-primary:hover {
        background: #4338ca;
        transform: translateY(-1px);
    }

    .login-footer {
        margin-top: 20px;
        text-align: center;
    }

    .hint {
        font-size: 12px;
        color: #888;
    }
</style>

<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h2>🔐 HR Login</h2>
            <p>Please enter your credentials to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter username"
                    required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">
                Login
            </button>
        </form>

        <div class="login-footer">
            <p class="hint">💡 Default credentials: admin / password123</p>
        </div>
    </div>
</div>
{% endblock %}
