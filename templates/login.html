{% extends "base.html" %}

{% block title %}Login - Adlab Solutions{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h2>🔐 HR Login</h2>
            <p>Please enter your credentials to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter username"
                    required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                    <button type="button" id="togglePassword" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: #64748b; padding: 0; display: flex; align-items: center; justify-content: center; outline: none;">
                        <i data-lucide="eye" size="18"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>
        </form>

        <div class="login-footer">
            <p class="hint">💡 Default credentials: admin / password123</p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle the icon
                const icon = this.querySelector('i');
                if (icon) {
                    if (type === 'password') {
                        icon.setAttribute('data-lucide', 'eye');
                    } else {
                        icon.setAttribute('data-lucide', 'eye-off');
                    }
                    lucide.createIcons(); // Re-render Lucide icons
                }
            });
        }
    });
</script>
{% endblock %}
