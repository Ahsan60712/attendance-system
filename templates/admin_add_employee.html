{% extends "base.html" %}

{% block title %}Add Employee - Adlab Solutions{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 animate-in">
    <h2 style="font-size: 1.5rem;" class="d-flex align-items-center gap-2">
        <i data-lucide="user-plus" style="width: 24px; height: 24px;"></i> Add New Employee
    </h2>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary btn-sm">
        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Back to Dashboard
    </a>
</div>

<div class="card animate-in" style="max-width: 600px; margin: 0 auto; animation-delay: 0.1s;">
    <h3 class="mb-4">Employee Details</h3>

    <form method="POST" action="{{ url_for('add_employee_route') }}">
        <div class="form-group">
            <label><i data-lucide="user" style="width:14px;height:14px;display:inline-block;"></i> Employee Name</label>
            <input type="text" name="emp_name" required placeholder="Full Name">
        </div>

        <div class="form-group">
            <label><i data-lucide="briefcase" style="width:14px;height:14px;display:inline-block;"></i> Team / Department</label>
            <input type="text" name="emp_team" required placeholder="e.g. Engineering">
        </div>

        <div class="form-group">
            <label><i data-lucide="shield" style="width:14px;height:14px;display:inline-block;"></i> System Role</label>
            <select name="role">
                <option value="employee">Employee</option>
                <option value="manager">Manager</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label><i data-lucide="file-text" style="width:14px;height:14px;display:inline-block;"></i> Contract Type</label>
            <div class="radio-group" style="background: var(--light); padding: 1rem; border-radius: 12px; border: 1px solid var(--border);">
                <label class="radio-label">
                    <input type="radio" name="contract_type" value="Contract" onchange="toggleDuration()" checked>
                    <span>Permanent / Contract</span>
                </label>
                <label class="radio-label">
                    <input type="radio" name="contract_type" value="Internship" onchange="toggleDuration()">
                    <span>Internship</span>
                </label>
            </div>
        </div>

        <div class="d-flex gap-4 mb-4" style="flex-wrap: wrap;">
            <div class="form-group mb-0 flex-1">
                <label>Contract Start</label>
                <input type="date" name="contract_start_date" required>
            </div>
            <div class="form-group mb-0 flex-1">
                <label>Contract End</label>
                <input type="date" name="contract_end_date" required>
            </div>
        </div>

        <div class="form-group" id="total-leaves-group">
            <label><i data-lucide="calendar" style="width:14px;height:14px;display:inline-block;"></i> Total Leaves (Yearly)</label>
            <input type="number" name="total_leaves" required placeholder="e.g. 14 or 20" min="0">
        </div>

        <button type="submit" class="btn btn-primary w-full mt-4 d-flex justify-content-center gap-2">
            <i data-lucide="user-plus" style="width:18px;height:18px;"></i> Create Employee Data
        </button>
    </form>
</div>

<script>
    function toggleDuration() {
        const radios = document.getElementsByName('contract_type');
        let type = 'Contract';
        for (let i = 0; i < radios.length; i++) {
            if (radios[i].checked) {
                type = radios[i].value;
                break;
            }
        }
        const totalLeavesGroup = document.getElementById('total-leaves-group');
        const totalLeavesInput = document.querySelector('input[name="total_leaves"]');

        if (type === 'Internship') {
            if (totalLeavesGroup) totalLeavesGroup.style.display = 'none';
            if (totalLeavesInput) {
                totalLeavesInput.value = 0;
                totalLeavesInput.required = false;
                totalLeavesInput.disabled = true;
            }
        } else {
            if (totalLeavesGroup) totalLeavesGroup.style.display = 'block';
            if (totalLeavesInput) {
                totalLeavesInput.required = true;
                totalLeavesInput.disabled = false;
                if (totalLeavesInput.value == 0) totalLeavesInput.value = '';
            }
        }
    }
    document.addEventListener('DOMContentLoaded', toggleDuration);
</script>
{% endblock %}
