<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - WFH & Leave System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Employee Login</h1>
            <p class="subtitle">Enter your employee name to continue</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('employee_login') }}" autocomplete="off">
                <div class="form-group">
                    <label for="emp_name">Employee Name</label>
                    <input type="text" id="emp_name" name="emp_name" required autofocus autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="form-footer">
                <a href="{{ url_for('index') }}">← Back to Home</a>
            </div>
        </div>
    </div>
</body>

</html>
